version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: optionchain-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15
    container_name: optionchain-postgres
    restart: always
    environment:
      POSTGRES_USER: optionuser
      POSTGRES_PASSWORD: optionpass
      POSTGRES_DB: optionchain
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optionuser -d optionchain"]
      interval: 5s
      timeout: 3s
      retries: 5

  fetcher:
    build:
      context: ..
      dockerfile: internal/fetcher/fetcher.Dockerfile
    container_name: optionchain-fetcher
    restart: always
    environment:
      REDIS_URL: "redis:6379"
    depends_on:
      redis:
        condition: service_healthy

  processor:
    build:
      context: ..
      dockerfile: internal/processing/processing.Dockerfile
    container_name: optionchain-processor
    restart: always
    environment:
      REDIS_URL: "redis:6379"
      DATABASE_URL: "postgres://optionuser:optionpass@postgres:5432/optionchain?sslmode=disable"
      PORT: "8090"
    ports:
      - "8090:8090"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  pgdata:
